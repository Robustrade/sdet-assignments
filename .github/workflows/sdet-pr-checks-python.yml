name: sdet-pr-checks-python

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:

  # ── Detect which candidate folder changed in this PR ─────────────────────────
  detect-candidate:
    name: detect-candidate
    runs-on: ubuntu-latest
    outputs:
      candidate_dir: ${{ steps.detect.outputs.candidate_dir }}
      is_python: ${{ steps.check-lang.outputs.is_python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect candidate folder
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi

          CANDIDATE_DIR=$(git diff --name-only "$BASE"...HEAD \
            | grep '^submission/' \
            | awk -F'/' '{print $1"/"$2}' \
            | sort -u \
            | head -1)

          if [ -z "$CANDIDATE_DIR" ]; then
            echo "No candidate submission detected in changed files — skipping candidate checks."
            echo "candidate_dir=" >> "$GITHUB_OUTPUT"
            echo "is_python=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected candidate folder: $CANDIDATE_DIR"
          echo "candidate_dir=$CANDIDATE_DIR" >> "$GITHUB_OUTPUT"

      - name: Check if Python project
        id: check-lang
        run: |
          if [ -f "$CANDIDATE_DIR/requirements.txt" ] || [ -f "$CANDIDATE_DIR/pyproject.toml" ]; then
            echo "is_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_python=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: lint
    needs: detect-candidate
    if: needs.detect-candidate.outputs.candidate_dir != '' && needs.detect-candidate.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    env:
      CANDIDATE_DIR: ${{ needs.detect-candidate.outputs.candidate_dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff
        run: ruff check "$CANDIDATE_DIR/"

      - name: Black
        run: black --check "$CANDIDATE_DIR/"

  # ── 2. Unit and integration tests ─────────────────────────────────────────────
  unit-and-integration-tests:
    name: unit-and-integration-tests
    needs: detect-candidate
    if: needs.detect-candidate.outputs.candidate_dir != '' && needs.detect-candidate.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    env:
      CANDIDATE_DIR: ${{ needs.detect-candidate.outputs.candidate_dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f "$CANDIDATE_DIR/requirements.txt" ]; then
            pip install -r "$CANDIDATE_DIR/requirements.txt"
          fi

      - name: Run tests
        run: |
          cd "$CANDIDATE_DIR"
          pytest -q

  # ── 3. DB schema / migration check ────────────────────────────────────────────
  db-migration-or-schema-check:
    name: db-migration-or-schema-check
    needs: detect-candidate
    if: needs.detect-candidate.outputs.candidate_dir != '' && needs.detect-candidate.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    env:
      CANDIDATE_DIR: ${{ needs.detect-candidate.outputs.candidate_dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "$CANDIDATE_DIR/requirements.txt" ]; then
            pip install -r "$CANDIDATE_DIR/requirements.txt"
          fi

      - name: Validate schema
        run: |
          if [ -f "$CANDIDATE_DIR/scripts/validate_schema.py" ]; then
            cd "$CANDIDATE_DIR"
            python scripts/validate_schema.py
          else
            echo "No validate_schema.py found in $CANDIDATE_DIR/scripts/. Add one or replace this step."
            exit 1
          fi

  # ── 4. Reliability tests ──────────────────────────────────────────────────────
  reliability-tests:
    name: reliability-tests
    needs: detect-candidate
    if: needs.detect-candidate.outputs.candidate_dir != '' && needs.detect-candidate.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    env:
      CANDIDATE_DIR: ${{ needs.detect-candidate.outputs.candidate_dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f "$CANDIDATE_DIR/requirements.txt" ]; then
            pip install -r "$CANDIDATE_DIR/requirements.txt"
          fi

      - name: Run reliability tests
        run: |
          cd "$CANDIDATE_DIR"
          pytest -q -m reliability

  # ── 5. Security and secrets scan ──────────────────────────────────────────────
  security-and-secrets-scan:
    name: security-and-secrets-scan
    needs: detect-candidate
    if: needs.detect-candidate.outputs.candidate_dir != '' && needs.detect-candidate.outputs.is_python == 'true'
    runs-on: ubuntu-latest
    env:
      CANDIDATE_DIR: ${{ needs.detect-candidate.outputs.candidate_dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Bandit
        run: bandit -r "$CANDIDATE_DIR/" -x "$CANDIDATE_DIR/tests" || true

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
